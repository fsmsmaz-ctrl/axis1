[build]
  command = "npx prisma generate && next build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Required environment variables (set in Netlify UI → Site settings → Environment variables)
#   DATABASE_URL   — Supabase connection pooler (transaction mode)
#   DIRECT_URL     — Supabase direct connection (for migrations)
#   JWT_SECRET     — Strong random string, min 32 chars
#   INIT_ADMIN_PASSWORD — Initial admin password (optional, defaults to Axis@2025!Secure)

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"